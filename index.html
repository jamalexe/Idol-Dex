<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Pop Idol Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="idol-card">
        <div class="image-container">
            <img src="idols/hanni.jpg" alt="K-Pop Idol">
        </div>
        <div class="info">
            <span class="group-tag">NewJeans</span>
            <h2>Hanni</h2>
            <p>Main Dancer & Vocalist</p>
            <div class="social-icons">
                <span>🎵</span> <span>📸</span> <span>✨</span>
            </div>
        </div>
    </div>

</body>
<script src="script.js"></script>
</body>
</html>
